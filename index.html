<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

  <body>
  <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐹joyeux anniversair premices❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd0e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            position: relative;
        }
        
        .floating-hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .floating-heart {
            position: absolute;
            font-size: 20px;
            animation: float 10s infinite ease-in-out;
            opacity: 0.6;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,182,193,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        h1 {
            text-align: center;
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            text-align: center;
            color: #ff6b9d;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        #canvas-container {
            position: relative;
            height: 400px;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        
        canvas {
            display: block;
        }
        
        .counter {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        }
        
        .counter-label {
            font-size: 1.1rem;
            margin-bottom: 10px;
            opacity: 0.95;
        }
        
        .counter-time {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .letter-section {
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #fff5f8 0%, #ffeef8 100%);
            border-radius: 20px;
            border-left: 5px solid #ff6b9d;
        }
        
        .letter-title {
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .letter-content {
            color: #555;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }
        
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #ff6b9d;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .signature {
            text-align: right;
            margin-top: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #d63384;
        }
        
        .start-btn {
            display: block;
            margin: 30px auto;
            padding: 20px 50px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8e53 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            font-family: 'Playfair Display', serif;
            position: relative;
            overflow: hidden;
        }
        
        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }
        
        .start-btn:active {
            transform: translateY(-1px) scale(0.98);
        }
        
        .hidden {
            display: none !important;
        }
        
        .audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }
        
        .audio-btn {
            background: #ff6b9d;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        
        .audio-btn:hover {
            transform: scale(1.1);
        }
        
        .volume-slider {
            width: 100px;
            cursor: pointer;
        }
        
        .music-hint {
            text-align: center;
            color: #ff6b9d;
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <audio id="bgMusic" loop>
        <source src="Caramello 2.mp3" type="audio/mpeg">
        Ton navigateur ne supporte pas l'audio.
    </audio>
    
    <div class="container">
        <div class="card">
            <h1>Pour jenny❤️</h1>
            <p class="subtitle">Mon amour depuis le 6 janvier 2024</p>
            
            <div id="introSection">
                <button class="start-btn" id="startBtn">
                    Clique pour découvrir 🌸
                </button>
                <p class="music-hint">🎵 La musique démarrera avec l'animation</p>
            </div>
            
            <div id="content" class="hidden">
                <div id="canvas-container">
                    <canvas id="treeCanvas" width="600" height="400"></canvas>
                </div>
                
                <div class="counter">
                    <div class="counter-label">Notre amour a commencé il y a...</div>
                    <div class="counter-time" id="timeCounter">Calcul...</div>
                </div>
                
                <div class="letter-section">
                    <div class="letter-title">Ma lettre pour toi...</div>
                    <div class="letter-content" id="letterText"></div>
                    <span class="typing-cursor" id="cursor"></span>
                    <div class="signature">— Je t'aime jenny joyeux anniversair</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="audio-controls" id="audioControls" style="display: none;">
        <button class="audio-btn" id="playPauseBtn">▶️</button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
    </div>

    <script>
        // Date de rencontre : 6 janvier 2024 à 17h
        const startDate = new Date('2024-01-06T17:00:00');
        
        const letter = `J'aurais tellement aimé te souhaiter joyeux anniversaire en face , pouvoir enfin te voir et fêter ça avec toi... C'est dur de se dire qu'on n'a jamais encore eu cette chance et que seule la distance nous sépare.on ma dit que je me casse trop la tête pour t'offrire un cadeau ,j'aurais bien voulu toffrir la lune mais quelqu'un a deja offert ça a sa gow 

On dit souvent que l'amour, c'est la douceur, mais avec toi j'ai appris que c'était surtout le courage. Si quelqu'un m'avait dit un jour que j'aimerais la plus têtue des filles, je ne l'aurais jamais cru ! Pourtant, malgré les disputes, la distance et nos problèmes personnels, on ne s'est jamais sentis mieux qu'à deux,malgré les sorciers entk il y'aura toujour quelqu'un qui voudra pas me voir avec toi,mais sa c'est son problème ,je voulais faire quelque chose de spécial et pas un simple message que j'enverrai a minuit donc j'ai
appris a coder pour réaliser ceci 

Toutes ces épreuves n'ont fait que prouver une chose : peu importe l'obstacle, c'est avec toi que je veux les franchirs. Merci d'être ma force et ma patience au quotidien. Je t'aime plus que tout.G+P`;
        
        let musicPlaying = false;
        let animationStarted = false;
        const audio = document.getElementById('bgMusic');
        const startBtn = document.getElementById('startBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        
        // Gestionnaire d'événement pour le bouton principal
        startBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!animationStarted) {
                animationStarted = true;
                startAnimation();
            }
        });
        
        // Gestionnaire pour le bouton play/pause
        playPauseBtn.addEventListener('click', toggleMusic);
        
        // Gestionnaire pour le volume
        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value / 100;
        });
        
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '🌸', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 13000);
            }, 800);
        }
        
        function updateCounter() {
            const now = new Date();
            const diff = now - startDate;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('timeCounter').textContent = 
                `${days} jours ${hours} heures ${minutes} minutes ${seconds} secondes`;
        }
        
        function typeWriter(text, element, speed = 50) {
            let i = 0;
            element.textContent = '';
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    document.getElementById('cursor').style.display = 'none';
                }
            }
            type();
        }
        
        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                playPauseBtn.textContent = '▶️';
            } else {
                audio.play().catch(e => console.log('Lecture impossible:', e));
                playPauseBtn.textContent = '⏸️';
            }
            musicPlaying = !musicPlaying;
        }
        
        function startAnimation() {
            // Cacher l'intro et montrer le contenu
            document.getElementById('introSection').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('audioControls').style.display = 'flex';
            
            // Essayer de démarrer la musique
            audio.volume = 0.5;
            audio.play().then(() => {
                musicPlaying = true;
                playPauseBtn.textContent = '⏸️';
            }).catch(e => {
                console.log('Autoplay bloqué:', e);
                musicPlaying = false;
                playPauseBtn.textContent = '▶️';
            });
            
            // Démarrer l'animation de l'arbre
            const canvas = document.getElementById('treeCanvas');
            const tree = new HeartTree(canvas);
            tree.draw();
            
            // Démarrer le compteur
            updateCounter();
            setInterval(updateCounter, 1000);
            
            // Démarrer l'effet de typing après un délai
            setTimeout(() => {
                typeWriter(letter, document.getElementById('letterText'), 40);
            }, 3000);
        }
        
        // Classe pour l'arbre en canvas
        class HeartTree {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.width = canvas.width;
                this.height = canvas.height;
                this.branches = [];
                this.hearts = [];
                
                this.init();
            }
            
            init() {
                this.startX = this.width / 2;
                this.startY = this.height - 50;
                this.createBranch(this.startX, this.startY, -90, 80, 8);
            }
            
            createBranch(x, y, angle, length, depth) {
                if (depth === 0) return;
                
                const endX = x + Math.cos(angle * Math.PI / 180) * length;
                const endY = y + Math.sin(angle * Math.PI / 180) * length;
                
                this.branches.push({
                    x1: x, y1: y,
                    x2: endX, y2: endY,
                    depth: depth,
                    grown: false,
                    progress: 0
                });
                
                const angleVar = 25 + Math.random() * 10;
                const lengthMult = 0.7 + Math.random() * 0.1;
                
                this.createBranch(endX, endY, angle - angleVar, length * lengthMult, depth - 1);
                this.createBranch(endX, endY, angle + angleVar, length * lengthMult, depth - 1);
                
                if (depth <= 3) {
                    for (let i = 0; i < 3; i++) {
                        this.hearts.push({
                            x: endX + (Math.random() - 0.5) * 40,
                            y: endY + (Math.random() - 0.5) * 40,
                            size: 0,
                            maxSize: 8 + Math.random() * 12,
                            color: `hsl(${340 + Math.random() * 20}, ${80 + Math.random() * 20}%, ${50 + Math.random() * 20}%)`,
                            delay: Math.random() * 1000,
                            growing: false,
                            sway: Math.random() * Math.PI * 2
                        });
                    }
                }
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                // Dessiner le sol
                this.ctx.strokeStyle = '#8B4513';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.height - 50);
                this.ctx.lineTo(this.width, this.height - 50);
                this.ctx.stroke();
                
                this.branches.sort((a, b) => b.depth - a.depth);
                
                let allGrown = true;
                
                this.branches.forEach(branch => {
                    if (!branch.grown) {
                        allGrown = false;
                        branch.progress += 0.02;
                        if (branch.progress >= 1) {
                            branch.progress = 1;
                            branch.grown = true;
                        }
                    }
                    
                    const currentX = branch.x1 + (branch.x2 - branch.x1) * branch.progress;
                    const currentY = branch.y1 + (branch.y2 - branch.y1) * branch.progress;
                    
                    const brown = Math.floor(139 - (8 - branch.depth) * 10);
                    this.ctx.strokeStyle = `rgb(${brown}, ${Math.floor(brown/2)}, ${Math.floor(brown/3)})`;
                    this.ctx.lineWidth = branch.depth * 1.5;
                    this.ctx.lineCap = 'round';
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(branch.x1, branch.y1);
                    this.ctx.lineTo(currentX, currentY);
                    this.ctx.stroke();
                });
                
                const time = Date.now();
                this.hearts.forEach(heart => {
                    if (heart.growing || (allGrown && time % 2000 > heart.delay)) {
                        heart.growing = true;
                        if (heart.size < heart.maxSize) {
                            heart.size += 0.3;
                        }
                        
                        heart.sway += 0.02;
                        const swayX = Math.sin(heart.sway) * 3;
                        
                        this.drawHeart(heart.x + swayX, heart.y, heart.size, heart.color);
                    }
                });
                
                if (!allGrown || this.hearts.some(h => h.size < h.maxSize)) {
                    requestAnimationFrame(() => this.draw());
                } else {
                    this.animateHearts();
                }
            }
            
            drawHeart(x, y, size, color) {
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y + size / 4);
                this.ctx.quadraticCurveTo(x, y, x + size / 4, y);
                this.ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
                this.ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
                this.ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
                this.ctx.quadraticCurveTo(x + size, y + size / 2, x + size / 2, y + size);
                this.ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
                this.ctx.fill();
            }
            
            animateHearts() {
                const animate = () => {
                    this.ctx.clearRect(0, 0, this.width, this.height);
                    
                    this.ctx.strokeStyle = '#8B4513';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, this.height - 50);
                    this.ctx.lineTo(this.width, this.height - 50);
                    this.ctx.stroke();
                    
                    this.branches.forEach(branch => {
                        const brown = Math.floor(139 - (8 - branch.depth) * 10);
                        this.ctx.strokeStyle = `rgb(${brown}, ${Math.floor(brown/2)}, ${Math.floor(brown/3)})`;
                        this.ctx.lineWidth = branch.depth * 1.5;
                        this.ctx.lineCap = 'round';
                        this.ctx.beginPath();
                        this.ctx.moveTo(branch.x1, branch.y1);
                        this.ctx.lineTo(branch.x2, branch.y2);
                        this.ctx.stroke();
                    });
                    
                    this.hearts.forEach(heart => {
                        heart.sway += 0.02;
                        const swayX = Math.sin(heart.sway) * 3;
                        const floatY = Math.sin(heart.sway * 0.5) * 2;
                        this.drawHeart(heart.x + swayX, heart.y + floatY, heart.size, heart.color);
                    });
                    
                    requestAnimationFrame(animate);
                };
                animate();
            }
        }
        
        // Initialiser les cœurs flottants
        createFloatingHearts();
    </script>
</body>
</html>
